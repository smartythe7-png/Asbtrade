<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyblock Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(270deg, #0f172a, #1e3a8a, #9333ea);
    background-size: 600% 600%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

.login-box {
    position: relative;
    width: 320px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(147,51,234,0.6);
    text-align: center;
    color: white;
}

.login-box h2 {
    margin-bottom: 25px;
    font-size: 26px;
}

/* Floating Input */
.input-box {
    position: relative;
    margin-bottom: 25px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid #aaa;
    border-radius: 8px;
    color: white;
    outline: none;
}

.input-box label {
    position: absolute;
    top: 50%;
    left: 10px;
    transform: translateY(-50%);
    color: #ccc;
    transition: 0.3s;
    pointer-events: none;
}

.input-box input:focus + label,
.input-box input:valid + label {
    top: -8px;
    font-size: 12px;
    color: #38bdf8;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #38bdf8, #9333ea);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #9333ea;
}

/* Links */
.link {
    display: block;
    margin-top: 15px;
    color: #ccc;
    cursor: pointer;
    transition: 0.3s;
}

.link:hover {
    color: #38bdf8;
}

</style>
</head>

<body>

<div class="login-box">
    <h2>🔥 Skyblock Login</h2>

    <div class="input-box">
        <input type="text" id="username" required>
        <label>Username</label>
    </div>

    <div class="input-box">
        <input type="password" id="password" required>
        <label>Password</label>
    </div>

    <button onclick="login()">Login</button>

    <span class="link" onclick="forgotPass()">Forgot Password?</span>
</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "" || pass === "") {
        alert("Fill all fields!");
    } else {
        alert("Welcome " + user + " 🚀");
        window.location.href = "index.html";
    }
}

function forgotPass() {
    let email = prompt("Enter your email:");
    if(email) {
        alert("Reset link sent to " + email);
    }
}
</script>

</body>
</html>
